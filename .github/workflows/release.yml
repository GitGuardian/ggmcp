name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Serialize releases: two merges close together must tag sequentially.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-version:
    runs-on: ubuntu-latest
    name: Tag New Version
    # A release happens when a merge on main changes the version in
    # pyproject.toml. Manual dispatch from main re-runs the same check.
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    outputs:
      tagged: ${{ steps.tag.outputs.tagged }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Tag if pyproject.toml version is new
        id: tag
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::pyproject.toml version '$version' is not X.Y.Z semver"
            exit 1
          fi
          tag="v${version}"
          if [ -n "$(git ls-remote --tags origin "refs/tags/${tag}")" ]; then
            echo "Tag ${tag} already exists, nothing to release."
            echo "tagged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "${tag}"
          git push origin "refs/tags/${tag}"
          echo "tagged=true" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  build-and-push-docker:
    name: Build and Push Docker Image
    needs: [ tag-version ]
    # Two entry points: a version tag pushed by a human, or a tag freshly
    # created by tag-version (tags pushed with GITHUB_TOKEN do not trigger
    # workflows, hence the same-run dependency instead of a tag trigger).
    # Manual dispatch from a non-main branch builds a <branch>-<sha> image
    # (no semver, no latest) for testing. Every push to main also refreshes
    # the mutable `main` tag (rolling dev image), release or not.
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref_type == 'tag') ||
        needs.tag-version.outputs.tagged == 'true' ||
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'workflow_dispatch' && github.ref_type == 'branch')
      )
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing (Sigstore/Rekor via GitHub OIDC)
    uses: ./.github/workflows/build_docker.yml
    with:
      # Empty outside releases: build_docker.yml then falls back to `main` / <branch>-<sha> tags.
      ref: ${{ github.ref_type == 'tag' && github.ref_name || needs.tag-version.outputs.tag }}
      release-tag: ${{ github.ref_type == 'tag' && github.ref_name || needs.tag-version.outputs.tag }}
      is-main: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit

  publish-to-pypi:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    if: false && github.event_name == 'push' && github.ref_type == 'tag'
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://test.pypi.org/project/ggmcp/
    concurrency:
      group: publish-pypi-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: |
          echo "Building ggmcp package..."
          uv build
          echo "Build artifacts:"
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          print-hash: true

      - name: Create summary
        run: |
          echo "## ✅ PyPI Publication Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Package published to: https://test.pypi.org/project/ggmcp/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "pip install --index-url https://test.pypi.org/simple/ ggmcp" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  publish-to-mcp-registry:
    runs-on: ubuntu-latest
    name: Publish to MCP Registry
    needs: [ publish-to-pypi ]
    if: |
      false &&
      always() &&
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      (needs.publish-to-pypi.result == 'success' || needs.publish-to-pypi.result == 'skipped')
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify server.json
        run: |
          echo "Validating server.json..."
          if [ ! -f "server.json" ]; then
            echo "❌ Error: server.json not found"
            exit 1
          fi

          if ! python3 -m json.tool server.json > /dev/null; then
            echo "❌ Error: server.json is not valid JSON"
            exit 1
          fi

          echo "✅ server.json is valid"

      - name: Install mcp-publisher
        run: |
          echo "Installing mcp-publisher..."
          PUBLISHER_VERSION=$(curl -sL https://api.github.com/repos/modelcontextprotocol/mcp-publisher/releases/latest | jq -r '.tag_name' | sed 's/^v//')

          if [ -z "$PUBLISHER_VERSION" ] || [ "$PUBLISHER_VERSION" = "null" ]; then
            echo "❌ Error: Failed to fetch latest mcp-publisher version"
            exit 1
          fi

          DOWNLOAD_URL="https://github.com/modelcontextprotocol/mcp-publisher/releases/download/v${PUBLISHER_VERSION}/mcp-publisher-linux-amd64"
          if ! wget -q "$DOWNLOAD_URL" -O mcp-publisher; then
            echo "❌ Error: Failed to download mcp-publisher"
            exit 1
          fi

          chmod +x mcp-publisher
          ./mcp-publisher --version
          echo "✅ Successfully installed mcp-publisher v${PUBLISHER_VERSION}"

      - name: Publish to MCP Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing to MCP Registry..."
          ./mcp-publisher publish --non-interactive
          echo "✅ Successfully published to MCP Registry"

      - name: Create summary
        run: |
          echo "## ✅ MCP Registry Publication Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Server registered in: https://github.com/modelcontextprotocol/registry" >> $GITHUB_STEP_SUMMARY

  create-github-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: [ tag-version, build-and-push-docker, publish-to-pypi ]
    # The release-tag guard matters: main pushes without a version bump still
    # build the rolling `main` image but must not create a GitHub release.
    if: |
      always() &&
      (github.ref_type == 'tag' || needs.tag-version.outputs.tagged == 'true') &&
      needs.build-and-push-docker.result == 'success' &&
      (needs.publish-to-pypi.result == 'success' || needs.publish-to-pypi.result == 'skipped')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || needs.tag-version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || needs.tag-version.outputs.tag }}
          draft: false
          generate_release_notes: true
          make_latest: true
